<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | App Brainstorming Tool</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f14;
    --border: #2a2a35;
    --accent: #c8ff57;
    --text: #e8e8f0;
    --muted: #6e6e88;
    --card: #1e1e28;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 24px 80px;
    max-width: 720px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 40px;
    transition: color 0.15s;
  }
  .back:hover { color: var(--text); }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 15px;
    color: #b0b0c8;
    margin-bottom: 40px;
    line-height: 1.7;
  }

  .contact-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .contact-icon {
    font-size: 36px;
    flex-shrink: 0;
  }

  .contact-body { flex: 1; }

  .contact-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .contact-email {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }

  .contact-email:hover { opacity: 0.8; }

  .contact-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
  }

  footer {
    margin-top: 64px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
  footer a:hover { color: var(--text); }
</style>
</head>
<body>

<a class="back" href="index.html">← アプリに戻る</a>

<h1>お問い合わせ</h1>
<p class="subtitle">ご意見・ご要望・不具合報告など、お気軽にご連絡ください。<br>通常2〜3営業日以内にご返信いたします。</p>

<div class="contact-card">
  <div class="contact-icon">✉️</div>
  <div class="contact-body">
    <div class="contact-label">メールアドレス</div>
    <a class="contact-email" href="mailto:youhira278@gmail.com">youhira278@gmail.com</a>
    <div class="contact-note">件名に「App Brainstorming Tool」と記載いただけると助かります。</div>
  </div>
</div>

<footer>
  <a href="index.html">ホーム</a>
  <span>·</span>
  <a href="privacy.html">プライバシーポリシー</a>
  <span>·</span>
  <span>© 2026 App Brainstorming Tool</span>
</footer>

</body>
</html>
